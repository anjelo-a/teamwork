name: CI

on:
  push:
  pull_request:

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/teamwork_ci?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/teamwork_ci_shadow?schema=public
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create CI databases
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/postgres -v ON_ERROR_STOP=1 <<'SQL'
          SELECT 'CREATE DATABASE teamwork_ci'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'teamwork_ci')\gexec
          SELECT 'CREATE DATABASE teamwork_ci_shadow'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'teamwork_ci_shadow')\gexec
          SQL

      - name: Run release gate
        run: pnpm release:gate
